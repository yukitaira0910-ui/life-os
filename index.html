<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life OS</title>

<link rel="manifest" href="manifest.json">

<style>
body{
font-family: system-ui;
background:#0f172a;
color:white;
margin:0;
}
.sidebar{
width:220px;
background:#020617;
height:100vh;
padding:20px;
position:fixed;
}
.main{
margin-left:240px;
padding:20px;
}
button{
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:8px;
}
input{
padding:10px;
border-radius:8px;
border:none;
margin-right:8px;
}
.card{
background:#020617;
padding:16px;
border-radius:12px;
margin-bottom:12px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Life OS</h2>
<button onclick="show('tasks')">Tasks</button><br><br>
<button onclick="show('goals')">Goals</button>
</div>

<div class="main">

<div id="tasks">
<h1>Tasks</h1>
<input id="taskInput">
<button onclick="addTask()">Add</button>
<div id="taskList"></div>
</div>

<div id="goals" style="display:none">
<h1>Goals</h1>
<input id="goalInput">
<button onclick="addGoal()">Add</button>
<div id="goalList"></div>
</div>

</div>

<script>
let tasks=[]
let goals=[]

function show(page){
document.getElementById("tasks").style.display="none"
document.getElementById("goals").style.display="none"
document.getElementById(page).style.display="block"
}

function addTask(){
let v=taskInput.value
tasks.push(v)
renderTasks()
}

function renderTasks(){
taskList.innerHTML=tasks.map(t=>
`<div class="card">${t}</div>`
).join("")
}

function addGoal(){
let v=goalInput.value
goals.push(v)
renderGoals()
}

function renderGoals(){
goalList.innerHTML=goals.map(t=>
`<div class="card">${t}</div>`
).join("")
}
</script>

</body>
</html>
