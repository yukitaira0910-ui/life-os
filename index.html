<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life OS</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="">
<style>
body{margin:0;font-family:system-ui;background:#0f172a;color:white}
.sidebar{width:240px;background:#020617;height:100vh;position:fixed;padding:20px}
.main{margin-left:260px;padding:20px}
.card{background:#020617;padding:16px;border-radius:12px;margin:10px 0}
button{background:#2563eb;border:none;color:white;padding:8px 12px;border-radius:8px}
input{padding:8px;border-radius:8px;border:none;margin-right:8px}
</style>
</head>
<body>

<div class="sidebar">
<h2>Life OS</h2>
<button onclick="showPage('tasks')">Tasks</button><br><br>
<button onclick="showPage('goals')">Goals</button>
</div>

<div class="main">

<div id="tasks">
<h1>Tasks</h1>

<input id="taskInput">
<button onclick="addTask()">Add Task</button>

<div id="taskList"></div>

<h2>Habits</h2>
<input id="habitInput">
<button onclick="addHabit()">Add Habit</button>
<div id="habitList"></div>

</div>

<div id="goals" style="display:none">
<h1>Goals</h1>

<input id="goalInput">
<button onclick="addGoal()">Add Goal</button>

<div id="goalList"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
